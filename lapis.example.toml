# Copy this file to lapis.toml and adjust values for your environment.
# Do not put API keys in this file; set the referenced environment variables instead.

[logging]
# Supported CLI log formats: compact, pretty, json.
format = "json"

[network]
timeout_ms = 30000
max_retries = 2
retry_backoff_ms = 200
user_agent = "lapis/0.1.0"

[search.providers.exa]
enabled = false
base_url = "https://api.exa.ai"
api_key_env = "EXA_API_KEY"
timeout_ms = 30000
model = ""

[search.providers.grok]
enabled = false
base_url = "https://api.x.ai"
api_key_env = "XAI_API_KEY"
timeout_ms = 30000
model = "grok-4.20-fast"
# Optional Grok-only knobs:
#   search_context_size = "low"   # one of: low | medium | high (default: low)
#   max_output_tokens = 1024      # cap response size; omit to let provider default apply

[model.providers.openai]
enabled = false
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
timeout_ms = 30000
model = "gpt-5.5"

# Set any budget value to -1 to make that limit unlimited.
[budget.research]
max_agents = -1
max_concurrent_agents = -1
max_total_model_calls = -1
max_total_search_calls = -1
total_timeout_ms = -1
max_tokens = -1

[budget.per_agent]
max_turns = -1
max_tool_calls = -1
max_search_calls = -1
timeout_ms = -1
